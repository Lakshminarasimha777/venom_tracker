services:
  - type: web
    name: venom-tracker
    env: python
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: SECRET_KEY
        value: change-me-in-production
      - key: FLASK_ENV
        value: production
      - key: DEBUG
        value: 'False'
    healthCheckPath: /
    autoDeploy: true
    instanceType: starter
