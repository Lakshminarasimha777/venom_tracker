services:
  - type: web
    name: venom-tracker
    env: python
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        value: change-me-in-production
      - key: FLASK_ENV
        value: production
      - key: DEBUG
        value: 'False'
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: mln123
      - key: ADMIN_EMAIL
        value: mln@gmail.com
    healthCheckPath: /
    autoDeploy: true
    instanceType: starter
