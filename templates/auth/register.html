{% extends "base.html" %}

{% block title %}Register - Venom_Tracker{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-user-plus fa-3x text-primary"></i>
                        <h2 class="mt-3">Register as User</h2>
                        <p class="text-muted">Create your account to access hospitals and emergency services</p>
                    </div>
                    
                    <form method="POST" action="{{ url_for('auth.register_user') }}">
                        <!-- Username -->
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username" placeholder="Choose a username" required>
                            <small class="form-text text-muted">3-20 characters, alphanumeric</small>
                        </div>
                        
                        <!-- Email -->
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
                        </div>
                        
                        <!-- Phone -->
                        <div class="mb-3">
                            <label for="phone" class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" id="phone" name="phone" placeholder="Enter your phone number" required>
                        </div>
                        
                        <!-- District -->
                        <div class="mb-3">
                            <label for="district" class="form-label">District</label>
                            <select class="form-select" id="district" name="district" required>
                                <option value="">Select your district</option>
                                <option>Visakhapatnam</option>
                                <option>Vizianagaram</option>
                                <option>Srikakulam</option>
                                <option>East Godavari</option>
                                <option>West Godavari</option>
                                <option>Krishna</option>
                                <option>Guntur</option>
                                <option>Prakasam</option>
                                <option>Nellore</option>
                                <option>Chittoor</option>
                                <option>Kadapa</option>
                                <option>Anantapur</option>
                            </select>
                        </div>
                        
                        <!-- Password -->
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Create a password" required>
                            <small class="form-text text-muted">At least 6 characters</small>
                        </div>
                        
                        <!-- Confirm Password -->
                        <div class="mb-3">
                            <label for="confirm_password" class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
                        </div>
                        
                        <!-- Terms -->
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="terms" name="terms" required>
                            <label class="form-check-label" for="terms">
                                I agree to the Terms of Service and Privacy Policy
                            </label>
                        </div>
                        
                        <!-- Submit -->
                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="fas fa-user-plus"></i> Create Account
                        </button>
                    </form>
                    
                    <hr>
                    
                    <!-- Login Link -->
                    <p class="text-center mb-0">
                        Already have an account?
                        <a href="{{ url_for('auth.login_user_page') }}" class="text-decoration-none fw-bold">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
