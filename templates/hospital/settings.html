{% extends "base.html" %}

{% block title %}Settings - {{ hospital.name }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 bg-light py-3" style="min-height: calc(100vh - 100px);">
            <nav class="nav flex-column">
                <a class="nav-link" href="{{ url_for('hospital.dashboard') }}">
                    <i class="fas fa-chart-line"></i> Dashboard
                </a>
                <a class="nav-link" href="{{ url_for('hospital.emergency_cases') }}">
                    <i class="fas fa-exclamation-circle"></i> Emergency Cases
                </a>
                <a class="nav-link" href="{{ url_for('hospital.stock') }}">
                    <i class="fas fa-boxes"></i> Stock Management
                </a>
                <a class="nav-link" href="{{ url_for('hospital.analytics') }}">
                    <i class="fas fa-chart-bar"></i> Analytics
                </a>
                <a class="nav-link" href="{{ url_for('hospital.notifications') }}">
                    <i class="fas fa-bell"></i> Notifications
                </a>
                <a class="nav-link active" href="{{ url_for('hospital.settings') }}">
                    <i class="fas fa-cog"></i> Settings
                </a>
            </nav>
        </div>

        <div class="col-md-10 py-4">
            <div class="mb-4">
                <h1>Hospital Settings</h1>
                <p class="text-muted">Update your hospital details and contact information.</p>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <form method="post" action="{{ url_for('hospital.update_settings') }}">
                        <div class="row gy-3">
                            <div class="col-md-6">
                                <label class="form-label">Hospital Name</label>
                                <input type="text" class="form-control" value="{{ hospital.name }}" disabled>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" value="{{ hospital.email }}" disabled>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Phone</label>
                                <input type="text" class="form-control" name="phone" value="{{ hospital.phone }}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Beds</label>
                                <input type="number" class="form-control" name="beds" value="{{ hospital.beds }}" min="0">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Staff Count</label>
                                <input type="number" class="form-control" name="staff_count" value="{{ hospital.staff_count }}" min="0">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Address</label>
                                <textarea class="form-control" name="address" rows="3" required>{{ hospital.address }}</textarea>
                            </div>
                        </div>

                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
